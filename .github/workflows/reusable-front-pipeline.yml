name: "NodeJS Reusable Pipeline"

on:
  workflow_call:
    inputs:
      NODEJS_VERSION:
        type: string
        default: "20"
        description: "Node Version to make the build"
      IS_RELEASE:
        type: boolean
        default: false
        description: "Check if is a Release Build"
      SKIP_BUILD:
        type: boolean
        default: false
        description: "Indicates if Build Stage must be skipped"
      GET_DEPENDENCIES_COMMAND:
        type: string
        default: "npm ci"
        description: "Custom command to get Dependencies"
      BUILD_COMMAND:
        type: string
        default: "npm run build"
        description: "Custom Build command"
      APP_OUTPUT_PATH:
        type: string
        default: "dist"
        description: "Code Output directory"
      SKIP_HORUSEC:
        type: boolean
        default: false
        description: "Check if you want Skip Horusec scan stage"
      HORUSEC_EXCLUSIONS:
        type: string
        default: ""
        description: "Folders to discard from Horusec analysis, separated by commas"
      HORUSEC_FALSE_POSITIVES:
        type: string
        default: ""
        description: "Hashes to consider as false positives in Horusec analysis, separated by commas"
      HORUSEC_ACCEPTED_RISKS:
        type: string
        default: ""
        description: "Hashes to consider as accepted risks in Horusec analysis, separated by commas"
      SKIP_TEST:
        type: boolean
        default: true
        description: "Check if you want Skip Unit Test stage"
      TEST_COMMAND:
        type: string
        default: "npm test"
        description: "Custom Unit Test command"
      DEPLOY_TYPE:
        type: string
        default: "NONE"
        description: "Type of Deploy (CLOUD_RUN legacy maps to Azure Container Apps)"
      ENVIRONMENT:
        type: string
        required: true
        description: "Target environment (dev, stg, pro)"
      PROJECT_NAME:
        type: string
        required: true
        description: "Name of the project"
      SONAR_PROJECT_KEY:
        type: string
        default: ""
        description: "Explicit SonarQube project key"
      SONAR_HOST_URL:
        type: string
        default: "http://sonarqube.gcp.palo-it.net"
        description: "SonarQube host URL"
      SONAR_ORGANIZATION:
        type: string
        default: ""
        description: "SonarCloud organization key (if applicable)"
      AZURE_CONTAINER_APP_NAME:
        type: string
        required: true
        description: "Name of the target Azure Container App"
      AZURE_RESOURCE_GROUP:
        type: string
        required: true
        description: "Azure Resource Group"
      AZURE_CONTAINER_REGISTRY:
        type: string
        required: true
        description: "Azure Container Registry domain (e.g., myregistry.azurecr.io)"
      CONTAINER_IMAGE_NAME:
        type: string
        default: "paloit-devops/gcf/nginx-deploy:latest"
        description: "Container image to deploy on Azure Container Apps"
      USE_OIDC_AUTH:
        type: boolean
        default: false
        description: "Use OIDC authentication instead of Service Principal"
      NEXUS_BASE_URL:
        type: string
        default: "http://nexus.gcp.palo-it.net"
        description: "URL base de Nexus"
      NEXUS_PROJECT_PATH:
        type: string
        default: "customer-projects/default-project"
        description: "Ruta base dentro del repositorio de Nexus"
    secrets:
      NEXUS_USER:
        required: true
      NEXUS_PASSWORD:
        required: true
      SONAR_TOKEN:
        required: true
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      AZURE_CREDENTIALS:
        required: false

jobs:
  ci-cd-process:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENVIRONMENT }}
    steps:
      # STAGE 0: Set Dynamic Environment variables based on IS_RELEASE (Legacy Groovy logic)
      - name: "Stage 0: Calculate Dynamic Environment"
        id: env_calc
        run: |
          if [ "${{ inputs.IS_RELEASE }}" = "true" ]; then
            echo "NEXUS_REPO=repository/nodejs-release" >> $GITHUB_ENV
          else
            echo "NEXUS_REPO=repository/nodejs-snapshot" >> $GITHUB_ENV
          fi
          # Unique revision suffix creation (Legacy Jenkins logic)
          echo "REVISION_SUFFIX=${{ github.run_number }}-$(date +%s)" >> $GITHUB_ENV

      # STAGE 1 & 2: Checkout SCM and Setup Node.js Environment
      - name: "Stage 1 & 2: Checkout and Setup Node"
        uses: actions/checkout@v4

      - name: "Setup Node.js v${{ inputs.NODEJS_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.NODEJS_VERSION }}
          cache: 'npm'

      # STAGE 4: Horusec SAST Scan
      - name: "Stage 4: Horusec SAST Scan"
        if: ${{ inputs.SKIP_HORUSEC == false }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/ZupIT/horusec/main/deployments/scripts/install.sh | bash -s latest
          horusec start \
            -p="./" \
            --disable-docker \
            --ignore="${{ inputs.HORUSEC_EXCLUSIONS }}" \
            --false-positive="${{ inputs.HORUSEC_FALSE_POSITIVES }}" \
            --risk-accept="${{ inputs.HORUSEC_ACCEPTED_RISKS }}" \
            --analysis-timeout=300

      # STAGE 5: Install Dependencies
      - name: "Stage 5: Install Dependencies"
        run: ${{ inputs.GET_DEPENDENCIES_COMMAND }}

      # STAGE 6: Compile Application
      - name: "Stage 6: Compile"
        if: ${{ inputs.SKIP_BUILD == false }}
        run: ${{ inputs.BUILD_COMMAND }}

      # STAGE 7: Unit Test Application
      - name: "Stage 7: Unit Test"
        if: ${{ inputs.SKIP_TEST == false }}
        run: ${{ inputs.TEST_COMMAND }}

      # STAGE 8: SonarQube Analysis
      - name: "Stage 8: SonarQube Analysis"
        if: ${{ inputs.SKIP_BUILD == false }}
        uses: sonarsource/sonarqube-scan-action@v3
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.SONAR_PROJECT_KEY != '' && inputs.SONAR_PROJECT_KEY || inputs.PROJECT_NAME }}
            -Dsonar.projectName=${{ inputs.PROJECT_NAME }}
            -Dsonar.host.url=${{ inputs.SONAR_HOST_URL }}
            ${{ inputs.SONAR_ORGANIZATION != '' && format('-Dsonar.organization={0}', inputs.SONAR_ORGANIZATION) || '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # STAGE 9: Compressing Files (No Dockerfile context)
      - name: "Stage 9: Compressing Files"
        if: ${{ inputs.SKIP_BUILD == false }}
        run: |
          # 1. Validar que la ruta de origen exista y no esté vacía
          if [ ! -d "${{ inputs.APP_OUTPUT_PATH }}" ] || [ -z "$(ls -A ${{ inputs.APP_OUTPUT_PATH }} 2>/dev/null)" ]; then
            echo "Error: APP_OUTPUT_PATH [${{ inputs.APP_OUTPUT_PATH }}] no existe o está vacía."
            exit 1
          fi

          # 2. Crear directorio temporal
          mkdir -p _app
          
          # 3. Copiar archivos asegurando que falle si hay errores (sin || true)
          cp package.json _app/
          cp -r ${{ inputs.APP_OUTPUT_PATH }}/. _app/
          
          # 4. Leer nombre y versión dinámicamente desde package.json (opcional, como en Jenkins)
          APP_NAME=$(node -p "require('./package.json').name")
          APP_VERSION=$(node -p "require('./package.json').version")
          FILE_NAME="${APP_NAME}-${APP_VERSION}-${{ env.REVISION_SUFFIX }}.zip"
          
          # 5. Comprimir el contenido
          cd _app && zip -r ../$FILE_NAME . && cd ..
          
          # 6. Exportar variables de entorno
          echo "ARTIFACT_FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "LOCAL_ZIP_PATH=$(pwd)/$FILE_NAME" >> $GITHUB_ENV

      # STAGE 10: Upload Artifacts to Nexus
      - name: "Stage 10: Upload Artifacts to Nexus"
        if: ${{ inputs.SKIP_BUILD == false }}
        run: |
          NEXUS_BASE_URL="${{ inputs.NEXUS_BASE_URL }}"
          FULL_ARTIFACT_URL="${NEXUS_BASE_URL}/${{ env.NEXUS_REPO }}/${{ inputs.NEXUS_PROJECT_PATH }}/${{ inputs.PROJECT_NAME }}/frontend/${{ env.ARTIFACT_FILE_NAME }}"
          
          echo "Uploading $ARTIFACT_FILE_NAME to Nexus..."
          
          curl -v -u "${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASSWORD }}" \
            --upload-file ${{ env.LOCAL_ZIP_PATH }} \
            "$FULL_ARTIFACT_URL"
            
          echo "ARTIFACT_URL=$FULL_ARTIFACT_URL" >> $GITHUB_ENV

      # STAGE 11: Deploy on Azure Container Apps
      - name: "Stage 11: Login to Azure (OIDC)"
        if: ${{ inputs.DEPLOY_TYPE == 'AZURE_CONTAINER_APPS' && inputs.USE_OIDC_AUTH == true }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "Stage 11b: Login to Azure (Service Principal)"
        if: ${{ inputs.DEPLOY_TYPE == 'AZURE_CONTAINER_APPS' && inputs.USE_OIDC_AUTH == false }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: "Execute Azure Container App Update"
        if: ${{ inputs.DEPLOY_TYPE == 'AZURE_CONTAINER_APPS' }}
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ inputs.AZURE_CONTAINER_APP_NAME }} \
              --resource-group ${{ inputs.AZURE_RESOURCE_GROUP }} \
              --image "${{ inputs.AZURE_CONTAINER_REGISTRY }}/${{ inputs.CONTAINER_IMAGE_NAME }}" \
              --cpu 1.0 \
              --memory 1.0Gi \
              --revision-suffix ${{ env.REVISION_SUFFIX }} \
              --set-env-vars \
                nexus_user="${{ secrets.NEXUS_USER }}" \
                nexus_password="${{ secrets.NEXUS_PASSWORD }}" \
                ARTIFACT_URL="${{ env.ARTIFACT_URL }}" \
                FILE_NAME_ARTIFACT="${{ env.ARTIFACT_FILE_NAME }}"
