name: 'CI for Node.js'
on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: '18'
      sonar_project_key:
        required: true
        type: string
      nexus_repository:
        required: true
        type: string
      artifact_path:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      NEXUS_USERNAME:
        required: true
      NEXUS_PASSWORD:
        required: true
      NEXUS_URL:
        required: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: \${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Horusec Scan
        uses: ./../modulos-comunes/qa-horusec-scan.yml

      - name: SonarQube Scan
        uses: ./../modulos-comunes/qa-sonar-scan.yml
        with:
          sonar_project_key: \${{ inputs.sonar_project_key }}
          sonar_token: \${{ secrets.SONAR_TOKEN }}
          sonar_host_url: \${{ secrets.SONAR_HOST_URL }}

  publish:
    name: Publish Artifact
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Nexus
        uses: ./../modulos-comunes/publish-nexus.yml
        with:
          nexus_username: \${{ secrets.NEXUS_USERNAME }}
          nexus_password: \${{ secrets.NEXUS_PASSWORD }}
          nexus_url: \${{ secrets.NEXUS_URL }}
          nexus_repository: \${{ inputs.nexus_repository }}
          artifact_path: \${{ inputs.artifact_path }}
